<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LianYin 成效儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; font-size: 14px; }

  .header { background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%); color: white; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-badge { background: rgba(255,255,255,0.2); border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 600; }
  .header-title h1 { font-size: 20px; font-weight: 700; }
  .header-title p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .header-right { font-size: 12px; opacity: 0.85; text-align: right; line-height: 1.7; }

  .controls { background: white; border-bottom: 1px solid #e4e6ea; padding: 12px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .preset-btns { display: flex; gap: 6px; }
  .preset-btn { padding: 5px 14px; border: 1.5px solid #e4e6ea; border-radius: 20px; background: white; font-size: 12px; cursor: pointer; color: #555; transition: all 0.15s; font-weight: 500; }
  .preset-btn:hover { background: #f6ffed; border-color: #52c41a; color: #52c41a; }
  .preset-btn.active { background: #52c41a; color: white; border-color: #52c41a; }
  .date-inputs { display: flex; align-items: center; gap: 6px; }
  .date-inputs input { padding: 5px 10px; border: 1.5px solid #e4e6ea; border-radius: 8px; font-size: 12px; outline: none; }
  .date-inputs input:focus { border-color: #52c41a; }
  .fetch-btn { padding: 7px 18px; background: #52c41a; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .fetch-btn:hover { background: #389e0d; }
  .fetch-btn:disabled { background: #aaa; cursor: not-allowed; }
  .status-text { font-size: 12px; color: #888; }
  .status-text.ok { color: #52c41a; }
  .status-text.err { color: #f5222d; }

  .tabs { background: white; border-bottom: 1px solid #e4e6ea; padding: 0 24px; display: flex; gap: 0; }
  .tab-btn { padding: 13px 20px; font-size: 14px; font-weight: 500; color: #888; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.15s; }

  .main { padding: 20px 24px; max-width: 1500px; margin: 0 auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.75); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  .loading-overlay.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 4px solid #e4e6ea; border-top-color: #52c41a; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .sc { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .sc .lbl { font-size: 11px; color: #65676b; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
  .sc .val { font-size: 22px; font-weight: 700; }
  .sc .sub { font-size: 11px; color: #999; margin-top: 3px; }
  .c-green .val { color: #52c41a; }
  .c-blue .val { color: #1877f2; }
  .c-orange .val { color: #fa8c16; }
  .c-purple .val { color: #722ed1; }
  .c-teal .val { color: #13c2c2; }
  .c-pink .val { color: #eb2f96; }

  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 20px; }
  .chart-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .chart-card h3 { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 14px; }
  .chart-wrap { position: relative; height: 220px; }

  .table-card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow: hidden; margin-bottom: 20px; }
  .table-header { padding: 14px 20px; border-bottom: 1px solid #f0f2f5; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .table-header h3 { font-size: 15px; font-weight: 600; }
  .table-header-right { display: flex; align-items: center; gap: 10px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f7f8fa; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: #65676b; padding: 10px 14px; text-align: right; white-space: nowrap; border-bottom: 1px solid #e4e6ea; cursor: pointer; user-select: none; }
  th:first-child { text-align: left; cursor: default; }
  th.sortable:hover { color: #52c41a; background: #f0fff0; }
  th.sort-asc::after { content: ' ↑'; }
  th.sort-desc::after { content: ' ↓'; }
  td { padding: 10px 14px; text-align: right; border-bottom: 1px solid #f5f5f5; font-size: 13px; white-space: nowrap; }

  .roas-high { color: #52c41a; font-weight: 700; }
  .roas-mid { color: #fa8c16; font-weight: 700; }
  .roas-low { color: #f5222d; font-weight: 700; }
  .spend-bar-wrap { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
  .spend-bar { height: 5px; border-radius: 3px; background: #52c41a; opacity: 0.65; min-width: 2px; }
  .cell-name { font-weight: 600; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

  .filter-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .search-input { padding: 5px 12px; border: 1.5px solid #e4e6ea; border-radius: 8px; font-size: 12px; outline: none; width: 180px; }
  .count-badge { font-size: 12px; color: #aaa; }

  th:first-child, td:first-child { position: sticky; left: 0; z-index: 2; background: inherit; }
  th:first-child { background: #f7f8fa; z-index: 3; }
  td:first-child { background: white; }
  tr:hover td:first-child { background: #f6ffed; }

  .placeholder { text-align:center; padding:60px; color:#aaa; }

  .camp-card-list-wrap { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .camp-card { background:white; border-radius:12px; padding:16px 20px; box-shadow:0 1px 4px rgba(0,0,0,0.07); display:flex; align-items:center; gap:24px; flex-wrap:wrap; }
  .camp-card-title { flex:0 0 200px; font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .camp-card-metrics { display:flex; flex:1; gap:22px; flex-wrap:wrap; }
  .cc-item { display:flex; flex-direction:column; min-width:68px; }
  .cc-lbl { font-size:10px; color:#999; text-transform:uppercase; letter-spacing:.3px; }
  .cc-delta { font-size:11px; font-weight:600; margin-top:1px; }
  .cc-delta-up { color:#52c41a; }
  .cc-delta-down { color:#f5222d; }
  .camp-card-total { border:none; background:#fff; }
  .camp-card-total .camp-card-title { font-size:15px; color:#1a1a2e; }
  .camp-card-sub { padding:8px 20px; margin-left:16px; }
  .camp-card-sub .camp-card-title { font-size:11px; font-weight:600; color:#666; flex-basis:184px; }
  .camp-card-sub .cc-val { font-size:12px; }
  .camp-card-sub .cc-lbl { font-size:9px; }
  .camp-card-sub .cc-delta { font-size:10px; }
  .cc-val { font-size:14px; font-weight:700; }
</style>
</head>
<body>

<div style="position:sticky;top:0;z-index:50">
<div class="header">
  <div class="header-left">

</div>

<div class="controls">
  <div class="preset-btns">
    <button class="preset-btn" onclick="applyPreset(1)">今天</button>
    <button class="preset-btn" onclick="applyPresetYesterday()">昨天</button>
    <button class="preset-btn active" onclick="applyPreset(7)">近7天</button>

</div>

  <button class="tab-btn" onclick="switchTab('svc-purchase')">購買</button>
  <button class="tab-btn" onclick="switchTab('svc-visit')">親臨門市</button>

</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <span style="color:#555;font-size:14px;">資料抓取中…</span>
</div>

<div class="main">
  <div class="tab-panel" id="tab-overall"><div class="placeholder">點擊「更新資料」開始載入</div></div>
  <div class="tab-panel" id="tab-perf"><div class="placeholder">點擊「更新資料」開始載入</div></div>
  <div class="tab-panel" id="tab-creative"><div class="placeholder">點擊「更新資料」開始載入</div></div>
  <div class="tab-panel" id="tab-gads"><div class="placeholder">點擊「更新資料」開始載入</div></div>
  <div class="tab-panel active" id="tab-allez"><div class="placeholder">點擊「更新資料」開始載入</div></div>
  <div class="tab-panel" id="tab-gkw"><div class="placeholder">點擊「更新資料」開始載入</div></div>
  <div class="tab-panel" id="tab-svc-repair"><div class="placeholder">點擊「更新資料」開始載入</div></div>
  <div class="tab-panel" id="tab-svc-rental"><div class="placeholder">點擊「更新資料」開始載入</div></div>
  <div class="tab-panel" id="tab-svc-purchase"><div class="placeholder">點擊「更新資料」開始載入</div></div>
  <div class="tab-panel" id="tab-svc-visit"><div class="placeholder">點擊「更新資料」開始載入</div></div>
  <div class="tab-panel" id="tab-svc-engagement"><div class="placeholder">點擊「更新資料」開始載入</div></div>

<script>
// ── 帳戶設定 ──────────────────────────────────────────────
const API_BASE = 'https://lianyin-dashboard.onrender.com';
const META_ACCOUNT_ID = '500489921658676';

// Google Ads 帳戶：每個帳戶對應一份「發布到網路」的 Google Sheet。
// pubBase 留空代表這個帳戶還沒設定好，會自動跳過不 fetch。
const GADS_ACCOUNTS = [
  {
    name: 'Allez',
    pubBase: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRa9Q-1QYbyZcr5x6GVhkZ_6OzGq_ZBfil1QjhQJZjJPgJEzqJsPVavNI-7U5RwJadLG7GINDp9kBfE/pub',
    gids: { daily: '', campaign: '897890015', age: '', gender: '', location: '', adgroup: '', keyword: '', service: '' },
    spendAdjust: 1,
  },
  {
    name: '聯瑩國際',
    pubBase: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vToDZOsLD9c8F0BopLl-zDqCr5cdiagCRTuT9zxmDtZuaIYEc5ZmTR7hRbvkCycORtzmBIVZY_cDVT9/pub',
    gids: { daily: '', campaign: '', age: '', gender: '', location: '', adgroup: '', keyword: '', service: '1783129967' },
    spendAdjust: 0.64, // 花費要先 /0.64 才是計算用的數字
  },
];

let allezCampRaw = [];
let allezGranularity = 'day';
let trendChart, pieChart;
let overallSpendChart = null, overallPieChart = null;
let allAdData = [];
let adUrlMap = {};
let sortKey = '', sortDir = -1;

// ── Date ──────────────────────────────────────────────────
function toYMD(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function clearPreset() { document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active')); }
function applyPreset(days) {
  const to = new Date(), from = new Date();
  from.setDate(to.getDate() - days + 1);
  document.getElementById('dateFrom').value = toYMD(from);
  document.getElementById('dateTo').value = toYMD(to);
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
function applyPresetYesterday() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  document.getElementById('dateFrom').value = toYMD(d);
  document.getElementById('dateTo').value = toYMD(d);
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
function applyPresetMonth() {
  const now = new Date();
  document.getElementById('dateFrom').value = toYMD(new Date(now.getFullYear(), now.getMonth(), 1));
  document.getElementById('dateTo').value = toYMD(now);
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
(function() {
  const to = new Date(), from = new Date();
  from.setDate(to.getDate() - 6);
  document.getElementById('dateFrom').value = toYMD(from);
  document.getElementById('dateTo').value = toYMD(to);
})();

// ── Tabs ──────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── CSV parser ────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i]||'').replace(/^"|"$/g,''));
    return obj;
  });
}

async function fetchGadsSheet(kind) {
  const accounts = GADS_ACCOUNTS.filter(a => a.pubBase && a.gids[kind]);
  if (!accounts.length) return [];
  const results = await Promise.all(accounts.map(async a => {
    try {
      const url = `${a.pubBase}?gid=${a.gids[kind]}&single=true&output=csv`;
      const res = await fetch(url);
      const rows = parseCSV(await res.text());
      const adj = a.spendAdjust || 1;
      rows.forEach(r => {
        r._account = a.name;
        if (adj !== 1 && r['花費(TWD)'] !== undefined) {
          r['花費(TWD)'] = String((parseFloat(r['花費(TWD)']) || 0) / adj);
        }
      });
      return rows;
    } catch(e) { return []; }
  }));
  return results.flat();
}

// ── Fetch ─────────────────────────────────────────────────
async function fetchData(forceRefresh = false) {
  const since = document.getElementById('dateFrom').value;
  const until = document.getElementById('dateTo').value;
  const btn = document.getElementById('fetchBtn');
  const status = document.getElementById('statusText');
  btn.disabled = true;
  document.getElementById('loadingOverlay').classList.add('show');
  status.textContent = '載入中…'; status.className = 'status-text';

  const force = forceRefresh;

  const svcPrev = prevRange(since, until);

  try {
    const [campRes, trendRes, adRes, urlRes, ageRes, genderRes, campTrendRes] = await Promise.all([
      fetch(`${API_BASE}/api/insights?accounts=${META_ACCOUNT_ID}&since=${since}&until=${until}&level=campaign${force?'&force=true':''}`),
      fetch(`${API_BASE}/api/insights?accounts=${META_ACCOUNT_ID}&since=${since}&until=${until}&level=account&time_increment=1${force?'&force=true':''}`),
      fetch(`${API_BASE}/api/insights?accounts=${META_ACCOUNT_ID}&since=${since}&until=${until}&level=ad${force?'&force=true':''}`),
      fetch(`${API_BASE}/api/ad_urls?account=${META_ACCOUNT_ID}`),
      fetch(`${API_BASE}/api/insights?accounts=${META_ACCOUNT_ID}&since=${since}&until=${until}&level=account&breakdowns=age`),
      fetch(`${API_BASE}/api/insights?accounts=${META_ACCOUNT_ID}&since=${since}&until=${until}&level=account&breakdowns=gender`),
      fetch(`${API_BASE}/api/insights?accounts=${META_ACCOUNT_ID}&since=${svcPrev.since}&until=${until}&level=campaign&time_increment=1`),
    ]);
    const campJson  = await campRes.json();
    const trendJson = await trendRes.json();
    const adJson    = await adRes.json();
    const ageJson   = await ageRes.json();
    const genderJson= await genderRes.json();
    const campTrendJson = await campTrendRes.json();
    const campData  = campJson.data || [];
    const trendData = trendJson.data || [];
    allAdData       = adJson.data || [];
    adUrlMap        = (await urlRes.json()).data || {};
    const metaCampTrend = campTrendJson.data || [];

    const [gDailyRaw, gCamp, gAge, gGender, gAg, gKw, gService] = await Promise.all([
      fetchGadsSheet('daily'), fetchGadsSheet('campaign'), fetchGadsSheet('age'),
      fetchGadsSheet('gender'), fetchGadsSheet('adgroup'), fetchGadsSheet('keyword'),
      fetchGadsSheet('service'),
    ]);
    // 「每日資料」分頁沒設定時，從「廣告活動」分頁依日期加總回推每日資料
    const gDaily = gDailyRaw.length ? gDailyRaw : deriveDailyFromCampaign(gCamp);

    renderOverall(trendData, gDaily, since, until, ageJson.data||[], genderJson.data||[], gAge, gGender);
    renderPerf(campData, trendData, since, until);
    renderCreative();
    renderDemographic(ageJson.data || [], genderJson.data || []);
    const gAll = { daily: gDaily, campaign: gCamp, age: gAge, gender: gGender, adgroup: gAg, keyword: gKw };
    renderGoogleAds(gAll, since, until);
    renderAllez(gAll, since, until);
    renderServiceTabs(metaCampTrend, gService, since, until);
    const kwRows = aggRows(filterByDate(gKw, since, until), ['關鍵字']).map(r => {
      const ctr  = r.imp > 0 ? r.clk/r.imp*100 : 0;
      const cpa  = r.purchase > 0 ? r.spend/r.purchase : 0;
      const roas = r.spend > 0 ? r.revenue/r.spend : 0;
      return { ...r._keys, spend:r.spend, imp:r.imp, clk:r.clk, ctr, purchase:r.purchase, revenue:r.revenue, cpa, roas };
    });
    renderGoogleKeyword(kwRows);

    const updatedAt = campJson.updated || new Date().toLocaleString('zh-TW');
    const isCached  = campJson.cached;
    document.getElementById('lastUpdate').textContent = updatedAt + (isCached ? '（快取）' : '');
    status.textContent = `✓ 完成・${campData.length} campaigns・${allAdData.length} 素材`;
    status.className = 'status-text ok';
  } catch(e) {
    status.textContent = `❌ ${e.message}`; status.className = 'status-text err';
  } finally {
    btn.disabled = false;
    document.getElementById('loadingOverlay').classList.remove('show');
  }
}

const PIE_COLORS = ['#4f8ef7','#f7954f','#52c41a','#f74f7e','#a855f7','#14b8a6','#f59e0b','#aaa'];

// ── Formatters ────────────────────────────────────────────
function fmtN(n, d=0) { if (n == null || isNaN(n)) return '<span class="na">—</span>'; return (+n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtM(n) { if (!n && n !== 0) return '<span class="na">—</span>'; return 'NT$'+Math.round(n).toLocaleString('zh-TW'); }
function fmtP(n) { if (n == null) return '<span class="na">—</span>'; return (+n).toFixed(2)+'%'; }
function rc(r) { return r >= 10 ? 'roas-high' : r >= 3 ? 'roas-mid' : 'roas-low'; }

// ── Perf Tab (Meta) ─────────────────────────────────────────

  const cpa = total.purchase > 0 ? total.spend/total.purchase : 0;

            const bw = Math.round(r.spend/maxSpend*80);
            return `<tr>

function groupByName(rows) {
  const map = {};
  for (const r of rows) {
    const key = r.ad_name || '—';
    if (!map[key]) map[key] = { ad_name: key, spend: 0, impressions: 0, link_clicks: 0, add_to_cart: 0, purchase: 0, purchase_value: 0 };
    const g = map[key];
    g.spend         += r.spend         || 0;
    g.impressions   += r.impressions   || 0;
    g.link_clicks   += r.link_clicks   || 0;
    g.add_to_cart   += r.add_to_cart   || 0;
    g.purchase      += r.purchase      || 0;
    g.purchase_value+= r.purchase_value|| 0;
  }
  return Object.values(map).map(g => ({
    ...g,
    ctr:  g.impressions > 0 ? g.link_clicks / g.impressions * 100 : 0,
    cplc: g.link_clicks > 0 ? g.spend / g.link_clicks : 0,
    roas: g.spend > 0 ? g.purchase_value / g.spend : 0,
    cpa:  g.purchase > 0 ? g.spend / g.purchase : 0,
  }));
}

function applyAdFilter() {
  const camp = document.getElementById('campFilter')?.value || '';
  const q = (document.getElementById('adSearch')?.value || '').toLowerCase();
  const filtered = allAdData.filter(r =>
    (!camp || r.campaign_name === camp) &&
    (!q || (r.ad_name||'').toLowerCase().includes(q))
  );
  renderAdTable(groupByName(filtered));
}

function sortAds(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = -1; }
  document.querySelectorAll('#tab-creative th.sortable').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.getAttribute('onclick') === `sortAds('${key}')`) th.classList.add(sortDir === -1 ? 'sort-desc' : 'sort-asc');
  });
  applyAdFilter();
}

function renderAdTable(data) {
  const sorted = [...data].sort((a,b) => ((a[sortKey]||0)-(b[sortKey]||0)) * sortDir);
  const maxSpend = Math.max(...sorted.map(r=>r.spend||0), 1);
  document.getElementById('adCount').textContent = `${sorted.length} 筆`;
  document.getElementById('adTableBody').innerHTML = sorted.map(r => {
    const bw = Math.round((r.spend||0)/maxSpend*60);
    const info = adUrlMap[r.ad_name] || {};

      ? `<img src="${thumb}" style="width:48px;height:48px;object-fit:cover;border-radius:6px;display:block;border:1px solid #eee;" onerror="this.style.display='none'">`
      : '<span class="na">—</span>';
    return `<tr>
      <td><span class="cell-name" title="${r.ad_name}">${r.ad_name||'—'}</span></td>
      <td style="text-align:center">${thumbCell}</td>
      <td><div class="spend-bar-wrap">${fmtM(r.spend)}<div class="spend-bar" style="width:${bw}px"></div></div></td>

      <td>${fmtN(r.add_to_cart)}</td>
      <td>${fmtN(r.purchase)}</td>
      <td>${fmtM(r.purchase_value)}</td>
      <td class="${rc(r.roas||0)}">${r.roas?(+r.roas).toFixed(2)+'x':'<span class="na">—</span>'}</td>

function renderDemographic(ageData, genderData) {
  const el = document.getElementById('tab-perf');

  function buildSectionHTML(rows, labelKey, labelMap) {
    if (!rows.length) return '<p style="color:#aaa;padding:20px">無資料</p>';
    const tableRows = rows.map(r => {
      const spend = +r.spend||0, pur = +r.purchase||0, roas = +r.roas||0;
      const cpa = pur ? spend/pur : 0;
      const label = labelMap?.[r[labelKey]] || r[labelKey] || '—';
      return `<tr>
        <td><strong>${label}</strong></td>
        <td>${fmtM(spend)}</td><td>${fmtN(+r.impressions||0)}</td><td>${fmtN(+r.link_clicks||0)}</td>
        <td>${fmtP(+r.ctr||0)}</td><td>${fmtN(pur)}</td><td>${fmtM(+r.purchase_value||0)}</td>
        <td class="${rc(roas)}">${roas?roas.toFixed(2)+'x':'<span class="na">—</span>'}</td>
        <td>${cpa?fmtM(cpa):'<span class="na">—</span>'}</td>
      </tr>`;
    }).join('');
    return `<div class="table-wrap"><table>
      <thead><tr>
        <th>${labelKey==='age'?'年齡':'性別'}</th><th>花費</th><th>曝光</th><th>點擊</th><th>CTR</th><th>加車</th><th>購買</th><th>轉換值</th><th>ROAS</th><th>CPA</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table></div>`;
  }

  const ageOrder = ['13-17','18-24','25-34','35-44','45-54','55-64','65+','Unknown'];
  const ageSorted = [...ageData].filter(r=>r.age).sort((a,b) => {
    const ai = ageOrder.indexOf(a.age), bi = ageOrder.indexOf(b.age);
    return (ai===-1?99:ai) - (bi===-1?99:bi);
  });
  const genderOrder = ['male','female','unknown'];
  const genderMap = { male:'男性', female:'女性', unknown:'不明' };
  const genderSorted = [...genderData].filter(r=>r.gender).sort((a,b) => {
    const ai = genderOrder.indexOf(a.gender), bi = genderOrder.indexOf(b.gender);
    return (ai===-1?99:ai) - (bi===-1?99:bi);
  });
  if (!ageSorted.length && !genderSorted.length) return;

  el.insertAdjacentHTML('beforeend', `<div style="padding:0 0 20px">
    <div class="table-card" style="margin-bottom:20px"><div class="table-header"><h3>年齡分析</h3></div>${buildSectionHTML(ageSorted, 'age', null)}</div>
    <div class="table-card"><div class="table-header"><h3>性別分析</h3></div>${buildSectionHTML(genderSorted, 'gender', genderMap)}</div>
  </div>`);
}

// ── Google Ads helpers ──────────────────────────────────────
function filterByDate(rows, since, until) {
  return rows.filter(r => {
    const d = r['日期'] || '';
    return d >= since && d <= until;
  });
}

function deriveDailyFromCampaign(rows) {
  const map = {};
  (rows || []).forEach(r => {
    const d = r['日期'];
    if (!d) return;
    if (!map[d]) map[d] = { spend:0, imp:0, clk:0, purchase:0, revenue:0 };
    const m = map[d];
    m.spend    += parseFloat(r['花費(TWD)'])||0;
    m.imp      += parseInt(r['曝光'])||0;
    m.clk      += parseInt(r['點擊'])||0;
    m.purchase += parseFloat(r['購買'])||0;
    m.revenue  += parseFloat(r['營收(TWD)'])||0;
  });
  return Object.entries(map).map(([d, m]) => ({
    '日期': d, '花費(TWD)': String(m.spend), '曝光': String(m.imp), '點擊': String(m.clk),
    '購買': String(m.purchase), '營收(TWD)': String(m.revenue),
  }));
}

function aggRows(rows, dimKeys) {
  const map = {};
  rows.forEach(r => {
    const key = dimKeys.map(k => r[k]||'').join('||');
    if (!map[key]) {
      map[key] = { _keys: {}, spend:0, imp:0, clk:0, purchase:0, revenue:0 };
      dimKeys.forEach(k => map[key]._keys[k] = r[k]||'');
    }
    map[key].spend    += parseFloat(r['花費(TWD)'])||0;
    map[key].imp      += parseInt(r['曝光'])||0;
    map[key].clk      += parseInt(r['點擊'])||0;
    map[key].purchase += parseFloat(r['購買'])||0;
    map[key].revenue  += parseFloat(r['營收(TWD)'])||0;
  });
  return Object.values(map).sort((a,b) => b.spend - a.spend);
}

function gadsTable(rows, cols) {
  if (!rows.length) return '<div style="padding:20px;color:#aaa">無資料</div>';
  const maxSpend = Math.max(...rows.map(r=>r.spend||0), 1);
  return `<div class="table-wrap"><table>
    <thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>{
      const bw = Math.round((r.spend||0)/maxSpend*60);
      return `<tr>${cols.map(c => {
        if (c.key === 'spend') return `<td><div class="spend-bar-wrap">${fmtM(r.spend)}<div class="spend-bar" style="width:${bw}px"></div></div></td>`;
        if (c.fmt === 'M') return `<td>${fmtM(r[c.key]||0)}</td>`;
        if (c.fmt === 'N') return `<td>${fmtN(r[c.key]||0)}</td>`;
        if (c.fmt === 'P') return `<td>${fmtP(r[c.key]||0)}</td>`;
        if (c.fmt === 'R') return `<td class="${rc(r[c.key]||0)}">${(r[c.key]||0)?((+r[c.key]).toFixed(2)+'x'):'<span class="na">—</span>'}</td>`;
        return `<td>${r[c.key]||'—'}</td>`;
      }).join('')}</tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

// ── 媒體總成效 Tab ─────────────────────────────────────────
function renderOverall(trendData, gDaily, since, until, metaAgeData, metaGenderData, gAge, gGender) {
  const el = document.getElementById('tab-overall');
  const gadsConfigured = GADS_ACCOUNTS.some(a => a.pubBase);

  const metaDays = trendData.filter(r => r.date_start >= since && r.date_start <= until);
  const meta = metaDays.reduce((a,r) => ({
    spend: a.spend+(r.spend||0), imp: a.imp+(r.impressions||0),
    clk: a.clk+(r.link_clicks||0), purchase: a.purchase+(r.purchase||0),
    revenue: a.revenue+(r.purchase_value||0),
  }), {spend:0,imp:0,clk:0,purchase:0,revenue:0});
  meta.roas = meta.spend > 0 ? meta.revenue/meta.spend : 0;
  meta.cpa  = meta.purchase > 0 ? meta.spend/meta.purchase : 0;
  meta.ctr  = meta.imp > 0 ? meta.clk/meta.imp*100 : 0;

  const gDays = filterByDate(gDaily, since, until);
  const gads = gDays.reduce((a,r) => ({
    spend: a.spend+(parseFloat(r['花費(TWD)'])||0), imp: a.imp+(parseInt(r['曝光'])||0),
    clk: a.clk+(parseInt(r['點擊'])||0), purchase: a.purchase+(parseFloat(r['購買'])||0),
    revenue: a.revenue+(parseFloat(r['營收(TWD)'])||0),
  }), {spend:0,imp:0,clk:0,purchase:0,revenue:0});
  gads.roas = gads.spend > 0 ? gads.revenue/gads.spend : 0;
  gads.cpa  = gads.purchase > 0 ? gads.spend/gads.purchase : 0;
  gads.ctr  = gads.imp > 0 ? gads.clk/gads.imp*100 : 0;

  const total = {
    spend: meta.spend + gads.spend, imp: meta.imp + gads.imp,
    clk: meta.clk + gads.clk, purchase: meta.purchase + gads.purchase,
    revenue: meta.revenue + gads.revenue,
  };
  total.roas = total.spend > 0 ? total.revenue/total.spend : 0;
  total.cpa  = total.purchase > 0 ? total.spend/total.purchase : 0;

  const metaByDate = {};
  metaDays.forEach(r => { metaByDate[r.date_start] = { spend: r.spend||0, revenue: r.purchase_value||0 }; });
  const gByDate = {};
  gDays.forEach(r => { gByDate[r['日期']] = { spend: parseFloat(r['花費(TWD)'])||0, revenue: parseFloat(r['營收(TWD)'])||0 }; });
  const allDates = [...new Set([...Object.keys(metaByDate), ...Object.keys(gByDate)])].sort();
  const dailySpend = allDates.map(d => (metaByDate[d]?.spend||0) + (gByDate[d]?.spend||0));
  const dailyRoas  = allDates.map(d => {
    const s = (metaByDate[d]?.spend||0) + (gByDate[d]?.spend||0);
    const rv = (metaByDate[d]?.revenue||0) + (gByDate[d]?.revenue||0);
    return s > 0 ? rv/s : 0;

  const gadsNote = gadsConfigured ? '' : '<div style="font-size:11px;color:#fa8c16;margin-top:4px">⚠️ Google Ads 尚未設定資料來源，目前只計 Meta</div>';

  el.innerHTML = `
    <div class="summary-grid">
      <div class="sc c-blue"><div class="lbl">合計花費</div><div class="val">${fmtM(total.spend)}</div><div class="sub">${since} ～ ${until}${gadsNote}</div></div>

      <div class="sc" style="background:#f0f9ff"><div class="lbl">Google 花費</div><div class="val" style="color:#34a853">${fmtM(gads.spend)}</div><div class="sub">${total.spend>0?(gads.spend/total.spend*100).toFixed(1)+'%':''}</div></div>
      <div class="sc c-teal"><div class="lbl">合計購買</div><div class="val">${Math.round(total.purchase).toLocaleString()}</div><div class="sub">Conversions</div></div>
      <div class="sc c-pink"><div class="lbl">合計營收</div><div class="val">${fmtM(total.revenue)}</div><div class="sub">Revenue</div></div>
      <div class="sc c-green"><div class="lbl">合計 ROAS</div><div class="val">${total.roas.toFixed(2)}x</div><div class="sub">營收 / 花費</div></div>
      <div class="sc"><div class="lbl">合計 CPA</div><div class="val">${fmtM(total.cpa)}</div><div class="sub">Cost per Purchase</div></div>
    </div>
    <div class="charts-row">

function aggCampaignTotals(rows) {
  const map = {};
  rows.forEach(r => {
    const key = r['廣告活動'] || '—';
    if (!map[key]) map[key] = { name:key, spend:0, clk:0, addCart:0, purchase:0, revenue:0 };
    const m = map[key];
    m.spend    += parseFloat(r['花費(TWD)'])||0;
    m.clk      += parseInt(r['點擊'])||0;
    m.addCart  += parseFloat(r['加入購物車'])||0;
    m.purchase += parseFloat(r['購買'])||0;
    m.revenue  += parseFloat(r['營收(TWD)'])||0;
  });
  return Object.values(map).map(m => ({
    ...m,
    cpc:         m.clk > 0 ? m.spend/m.clk : 0,
    cpaAddCart:  m.addCart > 0 ? m.spend/m.addCart : 0,
    cpaPurchase: m.purchase > 0 ? m.spend/m.purchase : 0,
    roas:        m.spend > 0 ? m.revenue/m.spend : 0,
  }));
}

function periodKey(dateStr, g) {
  if (g === 'day' || !dateStr) return dateStr;
  if (g === 'month') return dateStr.slice(0,7);
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1) - day;
  const monday = new Date(d); monday.setDate(d.getDate() + diff);
  return toYMD(monday);
}
function periodLabel(key, g) {
  if (g !== 'week') return key;
  const monday = new Date(key + 'T00:00:00');
  const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
  return `${key} ~ ${toYMD(sunday)}`;
}

function setAllezGranularity(g, btn) {
  allezGranularity = g;
  btn.parentElement.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAllezTable();
}

function renderAllezTable() {
  const campFilter = document.getElementById('allezCampFilter')?.value || '';
  const filtered = campFilter ? allezCampRaw.filter(r => r['廣告活動'] === campFilter) : allezCampRaw;
  const map = {};
  filtered.forEach(r => {
    const period = periodKey(r['日期'], allezGranularity);
    const camp = r['廣告活動'] || '—';
    const key = camp + '||' + period;
    if (!map[key]) map[key] = { camp, period, spend:0, clk:0, addCart:0, purchase:0, revenue:0 };
    const m = map[key];
    m.spend    += parseFloat(r['花費(TWD)'])||0;
    m.clk      += parseInt(r['點擊'])||0;
    m.addCart  += parseFloat(r['加入購物車'])||0;
    m.purchase += parseFloat(r['購買'])||0;
    m.revenue  += parseFloat(r['營收(TWD)'])||0;
  });
  const rows = Object.values(map).map(m => ({
    ...m,
    cpc:         m.clk > 0 ? m.spend/m.clk : 0,
    cpaPurchase: m.purchase > 0 ? m.spend/m.purchase : 0,
    roas:        m.spend > 0 ? m.revenue/m.spend : 0,
  })).sort((a,b) => a.camp === b.camp ? a.period.localeCompare(b.period) : a.camp.localeCompare(b.camp));

        <td class="${rc(r.roas)}">${r.roas?r.roas.toFixed(2)+'x':'<span class="na">—</span>'}</td>

function prevRange(since, until) {
  const s = new Date(since + 'T00:00:00'), u = new Date(until + 'T00:00:00');
  const days = Math.round((u - s) / 86400000) + 1;
  const prevUntil = new Date(s); prevUntil.setDate(s.getDate() - 1);
  const prevSince = new Date(prevUntil); prevSince.setDate(prevUntil.getDate() - days + 1);
  return { since: toYMD(prevSince), until: toYMD(prevUntil) };
}

function deltaHTML(cur, prev) {
  cur = cur || 0; prev = prev || 0;
  if (!prev) return cur ? `<span class="cc-delta cc-delta-up">新增</span>` : '';
  const pct = (cur - prev) / prev * 100;
  if (Math.abs(pct) < 0.05) return `<span class="cc-delta">持平</span>`;
  const cls = pct > 0 ? 'cc-delta-up' : 'cc-delta-down';
  const sign = pct > 0 ? '+' : '';
  return `<span class="cc-delta ${cls}">${sign}${pct.toFixed(0)}%</span>`;
}

    return aggRows(filterByDate(rows, since, until), dimKeys).map(r => {

      const cpa  = r.purchase > 0 ? r.spend/r.purchase : 0;
      const roas = r.spend > 0 ? r.revenue/r.spend : 0;

  if (fmt === 'M') return fmtM(val);
  if (fmt === 'P') return fmtP(val);
  return fmtN(val);
}

  repair:     { meta: metricsMetaRepair,     google: metricsGoogleRepair   },

  purchase:   { meta: metricsMetaPurchase,   google: metricsGooglePurchase },
  visit:      { meta: null,                  google: metricsGoogleVisit    },
  engagement: { meta: metricsMetaEngagement, google: null                  },
};

let serviceGranularity = {};
let serviceRawRows = {};
let serviceMetricFn = {};

function setServiceGranularity(idPrefix, g, btn) {
  serviceGranularity[idPrefix] = g;
  btn.parentElement.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderServiceTable(idPrefix);
}

function renderServiceTable(idPrefix) {
  const rows = serviceRawRows[idPrefix] || [];
  const metricFn = serviceMetricFn[idPrefix];
  const g = serviceGranularity[idPrefix] || 'day';
  const campFilter = document.getElementById(idPrefix + 'CampFilter')?.value || '';
  const filtered = campFilter ? rows.filter(r => r.name === campFilter) : rows;

  const map = {};
  filtered.forEach(r => {
    const period = periodKey(r.date, g);
    const key = r.name + '||' + period;
    if (!map[key]) map[key] = { name:r.name, period, __raw:{} };
    const m = map[key].__raw;
    Object.keys(r).forEach(k => {
      if (k === 'date' || k === 'name') return;
      m[k] = (m[k]||0) + (r[k]||0);
    });
  });
  const rowsOut = Object.values(map).sort((a,b) => a.name===b.name ? a.period.localeCompare(b.period) : a.name.localeCompare(b.name));
  const metricCols = rowsOut.length ? metricFn(rowsOut[0].__raw) : metricFn({});

  document.getElementById(idPrefix + 'TableWrap').innerHTML = `
    <table>
      <thead><tr><th>廣告活動</th><th>期間</th>${metricCols.map(m=>`<th>${m.label}</th>`).join('')}</tr></thead>
      <tbody>${rowsOut.map(r => {
        const metrics = metricFn(r.__raw);
        return `<tr>
          <td><span class="cell-name" title="${r.name}">${r.name}</span></td>
          <td>${periodLabel(r.period, g)}</td>
          ${metrics.map(m => `<td>${fmtByCode(m.val, m.fmt)}</td>`).join('')}
        </tr>`;
      }).join('')}</tbody>
    </table>`;
}

function renderServiceBlock(container, title, rows, metricFn, since, until, idPrefix, showTotal) {
  if (!rows.length) {
    container.insertAdjacentHTML('beforeend', `<div class="table-card" style="margin-bottom:20px"><div class="table-header"><h3>${title}</h3></div><div class="placeholder">無資料</div></div>`);
    return;
  }
  const prev = prevRange(since, until);
  const curRows  = rows.filter(r => r.date >= since && r.date <= until);
  const prevRows = rows.filter(r => r.date >= prev.since && r.date <= prev.until);

  function aggByName(list) {
    const map = {};
    list.forEach(r => {
      if (!map[r.name]) map[r.name] = {};
      const m = map[r.name];
      Object.keys(r).forEach(k => {
        if (k === 'date' || k === 'name') return;
        m[k] = (m[k]||0) + (r[k]||0);
      });
    });
    return map;
  }
  const curMap = aggByName(curRows);
  const prevMap = aggByName(prevRows);
  const names = Object.keys(curMap).sort((a,b) => (curMap[b].spend||0) - (curMap[a].spend||0));

  function sumRaw(map) {
    const total = {};
    Object.keys(map).forEach(name => {
      Object.keys(map[name]).forEach(k => { total[k] = (total[k]||0) + (map[name][k]||0); });
    });
    return total;
  }
  let totalCardHTML = '';
  if (showTotal) {
    const totalCur = metricFn(sumRaw(curMap));
    const totalPrev = metricFn(sumRaw(prevMap));
    totalCardHTML = `<div class="camp-card camp-card-total">
      <div class="camp-card-title" title="Meta-All">Meta-All</div>
      <div class="camp-card-metrics">
        ${totalCur.map((m,i) => `<div class="cc-item"><span class="cc-lbl">${m.label}</span><span class="cc-val">${fmtByCode(m.val,m.fmt)}</span>${deltaHTML(m.val, totalPrev[i] ? totalPrev[i].val : 0)}</div>`).join('')}
      </div>
    </div>`;
  }

  const cardsHTML = names.map(name => {
    const cur = metricFn(curMap[name]);
    const prv = metricFn(prevMap[name] || {});
    return `<div class="camp-card${showTotal ? ' camp-card-sub' : ''}">
      <div class="camp-card-title" title="${name}">${name}</div>
      <div class="camp-card-metrics">
        ${cur.map((m,i) => `<div class="cc-item"><span class="cc-lbl">${m.label}</span><span class="cc-val">${fmtByCode(m.val,m.fmt)}</span>${deltaHTML(m.val, prv[i] ? prv[i].val : 0)}</div>`).join('')}
      </div>
    </div>`;
  }).join('');

  serviceRawRows[idPrefix] = curRows;
  serviceMetricFn[idPrefix] = metricFn;
  serviceGranularity[idPrefix] = 'day';

  container.insertAdjacentHTML('beforeend', `
    <div class="camp-card-list-wrap">${totalCardHTML}${cardsHTML}</div>
    <div class="table-card" style="margin-bottom:20px">
      <div class="table-header">
        <h3>📋 ${title}明細</h3>
        <div class="table-header-right">
          <div class="filter-row">
            <select class="filter-select" id="${idPrefix}CampFilter" onchange="renderServiceTable('${idPrefix}')">
              <option value="">所有廣告活動</option>
              ${names.map(n => `<option value="${n}">${n}</option>`).join('')}
            </select>
            <div class="preset-btns">
              <button class="preset-btn active" onclick="setServiceGranularity('${idPrefix}','day',this)">日</button>
              <button class="preset-btn" onclick="setServiceGranularity('${idPrefix}','week',this)">週</button>
              <button class="preset-btn" onclick="setServiceGranularity('${idPrefix}','month',this)">月</button>
            </div>
          </div>
        </div>
      </div>
      <div class="table-wrap" id="${idPrefix}TableWrap"></div>
    </div>`);
  renderServiceTable(idPrefix);
}

function renderServiceTabs(metaCampTrend, gServiceRaw, since, until) {
  const metaRows = normMetaRows(metaCampTrend);
  // 5 個服務分頁的 Google 資料只算聯瑩國際，Allez 是另一條產品線不算進來
  const gRows = normGoogleServiceRows(gServiceRaw).filter(r => r._account === '聯瑩國際');

  SERVICE_CATEGORIES.forEach(cat => {
    const el = document.getElementById('tab-svc-' + cat.id);
    el.innerHTML = '';
    if (cat.meta) {
      const rows = metaRows.filter(r => (r.name||'').includes(cat.keyword));
      const showTotal = cat.id === 'repair' || cat.id === 'purchase';
      renderServiceBlock(el, `📘 Meta・${cat.label}`, rows, SERVICE_METRIC_FNS[cat.id].meta, since, until, 'svc' + cat.id + 'meta', showTotal);
    }
    if (cat.google) {
      const rows = gRows.filter(r => (r.name||'').includes(cat.keyword));
      renderServiceBlock(el, `🔍 Google・${cat.label}`, rows, SERVICE_METRIC_FNS[cat.id].google, since, until, 'svc' + cat.id + 'google', false);
    }
    if (!el.innerHTML) el.innerHTML = '<div class="table-card"><div class="placeholder">尚無資料</div></div>';
  });
}
